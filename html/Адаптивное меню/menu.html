<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Шапка</h1>
        </div>
        <div class="menu">
            <button class="menu__humburger">
                <span></span>
            </button>
            <ul class="menu__list">
                <li><a href="#" class="menu__link">Пункт 1</a></li>
                <li><a href="#" class="menu__link">Пункт 2</a></li>
                <li><a href="#" class="menu__link">Пункт 3</a></li>
                <li><a href="#" class="menu__link">Пункт 4</a></li>
                <li><a href="#" class="menu__link">Пункт 5</a></li>
                <li><a href="#" class="menu__link">Пункт 6</a></li>
            </ul>
        </div>
        <div class="footer">
            <h2>Подвал</h2>
        </div>
    </div>
    <script>
        let humburger = document.querySelector(".menu__humburger");
        if(humburger){
            humburger.addEventListener("click", (event) => event.target.closest(".menu").classList.toggle("menu--active"));
        }
    </script>
</body>
</html>
