<!DOCTYPE html>
<html>

  <title>Таблица</title>
  <style>
	table{
		background: yellow;
		border: 1px solid gray;
		border-collapse: collapse;
		width: 300px;
		height: 200px;
		margin: 0 auto;
		box-shadow: 0 50px 20px -20px gray;
		
	}
	td{
		border: 1px solid gray;
		box-shadow: inset 0 0 12px 2px gray;
	}
  </style>
 </head>

		</tr>

		 </tr>
   </table>
   
 </body>
</html>
