  <title>Иллюстрация разных временных функций — CSS-анимации — Дока</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
    }

    body {
      text-align: center;
      font: 12px/1 monospace;
      background: #18191C;
      color: #FFFFFF;
      min-height: 100vh;
      padding: 30px;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      align-content: center;
      justify-content: center;
    }

    div {
      position: relative;
      margin: 20px;
      width: 150px;
      height: 150px;
      background:#282A2E;
      box-shadow: 0 0 0 5px rgb(255 255 255 / 60%);
      transition:.2s;
    }

    div::after {
      content: attr(class);
      position: absolute;
      top: 6px;
      left: 6px;
      padding: 0 6px;
    }

    i {
      position: absolute;
      width: 5px;
      height: 5px;
      left: 0;
      bottom: 0;
      border-radius: 50%;
      background: #F498AD;
      animation: move 2s infinite;
    }

    @keyframes move {
      from {
        left: 0;
        bottom: 0;
      }
      to {
        left: 145px;
        bottom: 145px;
      }
    }

    .linear i {
      animation-timing-function: linear;
    }

    .ease i {
      animation-timing-function: ease;
    }

    .ease-in i {
      animation-timing-function: ease-in;
    }

    .ease-in-out i {
      animation-timing-function: ease-in-out;
    }

    .ease-out i {
      animation-timing-function: ease-out;
    }

    .cubic-bezier-1 i {
      animation-timing-function: cubic-bezier(0.8, 1.5, 0.2, -1);
    }

    .cubic-bezier-1::after { content: "cubic-bezier(0.8, 1.5, 0.2, -1)" }
    .cubic-bezier-2::after { content: "cubic-bezier(0.47, -0.44, 0.49, 1.46)" }
    .cubic-bezier-3::after { content: "cubic-bezier(1, 0, 0, 0.5)" }
    .cubic-bezier-4::after { content: "cubic-bezier(0.1, 0.7, 1, 1)" }

    .cubic-bezier-2 i {
      animation-timing-function: cubic-bezier(0.47, -0.44, 0.49, 1.46);
    }

    .cubic-bezier-3 i {
      animation-timing-function: cubic-bezier(1, 0, 0, 0.5);
    }

    .cubic-bezier-4 i {
      animation-timing-function: cubic-bezier(0.1, 0.7, 1, 0.1);
    }

    .steps i {
      animation-timing-function: steps(10, end);
    }

    .steps::after {
      content: "steps(10, end)";
    }

    i:nth-child(2) { animation-delay: 0.1s }
    i:nth-child(3) { animation-delay: 0.2s }
    i:nth-child(4) { animation-delay: 0.3s }
    i:nth-child(5) { animation-delay: 0.4s }
    i:nth-child(6) { animation-delay: 0.5s }
    i:nth-child(7) { animation-delay: 0.6s }
    i:nth-child(8) { animation-delay: 0.7s }
    i:nth-child(9) { animation-delay: 0.8s }
    i:nth-child(10) { animation-delay: 0.9s }
  </style>
